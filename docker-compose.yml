services:
  db:
    image: postgres:15-alpine
    container_name: rinha-db
    environment:
      POSTGRES_DB: rinha
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 123
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d rinha"]
      interval: 5s
      timeout: 5s
      retries: 5
    # mudei aq, espero não ter dado ruim
    command: >
      postgres
      -c max_connections=20
      -c shared_buffers=32MB
      -c effective_cache_size=64MB
      -c work_mem=1MB
      -c maintenance_work_mem=16MB
      -c log_min_messages=panic
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 128M

  api:
    build: .
    container_name: rinha-api
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: admin
      DB_PASS: 123
      DB_NAME: rinha
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 128M